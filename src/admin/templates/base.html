<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Betting Bot Admin{% endblock %}</title>

    <!-- Design tokens -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">

    <!-- Bootstrap 5 (base for components) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Material Symbols for icons -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block">

    <!-- HTMX -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>

    <!-- Alpine.js CSP build -->
    <script defer
            src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.14.1/dist/cdn.min.js"
            crossorigin="anonymous"></script>

    {% block head_extra %}{% endblock %}
</head>
<body x-data="uiState">
{% block body %}{% endblock %}
{% block scripts_extra %}{% endblock %}
</body>
</html>
