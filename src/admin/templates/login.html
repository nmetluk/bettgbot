{% extends "base.html" %}

{% block title %}Вход — Betting Bot Admin{% endblock %}

{% block head_extra %}
<style>
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--pv-s-24);
        background: var(--pv-bg);
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        background: var(--pv-panel);
        border: 1px solid var(--pv-border);
        border-radius: var(--pv-r-12);
        padding: var(--pv-s-32);
        box-shadow: var(--pv-shadow-lg);
    }
    .login-brand {
        text-align: center;
        margin-bottom: var(--pv-s-24);
    }
    .login-brand .logo {
        width: 48px; height: 48px;
        border-radius: var(--pv-r-8);
        background: var(--pv-fg);
        color: var(--pv-panel);
        display: inline-flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 20px;
        position: relative;
    }
    .login-brand .logo::after {
        content: ""; position: absolute; right: -4px; top: -4px;
        width: 12px; height: 12px; border-radius: 50%;
        background: var(--pv-accent);
    }
    .login-title {
        font-size: var(--pv-fs-18);
        font-weight: 700;
        color: var(--pv-fg);
        text-align: center;
        margin: var(--pv-s-16) 0 var(--pv-s-8);
    }
    .login-sub {
        font-size: var(--pv-fs-13);
        color: var(--pv-fg-muted);
        text-align: center;
        margin-bottom: var(--pv-s-24);
    }
    .login-field {
        margin-bottom: var(--pv-s-16);
    }
    .login-field label {
        display: block;
        font-size: var(--pv-fs-12);
        font-weight: 700;
        color: var(--pv-fg);
        margin-bottom: 6px;
    }
    .login-input {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        background: var(--pv-panel);
        border: 1px solid var(--pv-border);
        border-radius: var(--pv-r-6);
        color: var(--pv-fg);
        font: inherit; font-size: var(--pv-fs-14);
        outline: none;
        transition: 0.12s;
    }
    .login-input:focus {
        border-color: var(--pv-cta);
        box-shadow: var(--pv-focus);
    }
    .login-btn {
        width: 100%;
        height: 40px;
        margin-top: var(--pv-s-8);
        background: var(--pv-cta);
        border: 1px solid var(--pv-cta);
        color: #fff;
        font: inherit; font-size: var(--pv-fs-14); font-weight: 700;
        border-radius: var(--pv-r-6);
        cursor: pointer;
        transition: 0.12s;
    }
    .login-btn:hover {
        background: var(--pv-cta-2);
        border-color: var(--pv-cta-2);
    }
    .login-alert {
        padding: 12px;
        background: rgba(230, 64, 58, 0.12);
        border: 1px solid var(--pv-red);
        border-radius: var(--pv-r-6);
        color: var(--pv-red);
        font-size: var(--pv-fs-13);
        margin-bottom: var(--pv-s-20);
    }
    .login-controls {
        margin-top: var(--pv-s-32);
        padding-top: var(--pv-s-20);
        border-top: 1px solid var(--pv-divider);
    }
    .login-controls-title {
        font-size: var(--pv-fs-11);
        text-transform: uppercase;
        letter-spacing: var(--pv-tracking-caps);
        color: var(--pv-fg-muted);
        font-weight: 700;
        margin-bottom: var(--pv-s-12);
        text-align: center;
    }
    .login-controls-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--pv-s-16);
        flex-wrap: wrap;
    }
</style>
{% endblock %}

{% block body %}
<div class="login-page">
    <div class="login-card">
        <div class="login-brand">
            <div class="logo">B</div>
        </div>
        <h1 class="login-title">Панель управления</h1>
        <p class="login-sub">Войдите для администрирования бота прогнозов</p>

        {% if error %}
        <div class="login-alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" x-model="csrfToken">
            <div class="login-field">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" class="login-input" required autofocus>
            </div>
            <div class="login-field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" class="login-input" required>
            </div>
            <button type="submit" class="login-btn">Войти</button>
        </form>

        <!-- Demo: UI controls -->
        <div class="login-controls">
            <div class="login-controls-title">Дизайн-система v2 (демо)</div>
            <div class="login-controls-row">
                <!-- Theme toggle -->
                <button @click="toggleDark()"
                        class="pv-btn pv-btn-ghost pv-btn-sm"
                        :title="dark ? 'Светлая тема' : 'Тёмная тема'">
                    <span class="material-symbols-rounded" x-text="dark ? 'light_mode' : 'dark_mode'"></span>
                    <span x-text="dark ? 'Свет' : 'Тёмно'"></span>
                </button>

                <!-- Density controls -->
                <div class="pv-density-controls">
                    <button @click="setDensity('compact')"
                            class="pv-density-btn"
                            :class="{ 'active': density === 'compact' }"
                            title="Компактная">C</button>
                    <button @click="setDensity('regular')"
                            class="pv-density-btn"
                            :class="{ 'active': density === 'regular' }"
                            title="Обычная">R</button>
                    <button @click="setDensity('comfortable')"
                            class="pv-density-btn"
                            :class="{ 'active': density === 'comfortable' }"
                            title="Комфорт">K</button>
                </div>

                <!-- Accent swatches -->
                <div class="pv-accent-controls">
                    <template x-for="acc in accents" :key="acc">
                        <button @click="setAccent(acc)"
                                class="pv-accent-swatch"
                                :style="{ backgroundColor: acc }"
                                :class="{ 'active': accent === acc }"></button>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Pass CSRF token from Jinja to Alpine
    document.addEventListener('alpine:init', () => {
        Alpine.store('ui', {
            dark: false,
            csrfToken: '{{ request.state.csrf_token if request.state and request.state.csrf_token is defined else '' }}'
        });
    });
</script>
{% endblock %}
