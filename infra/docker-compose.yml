# Dev-окружение: только инфраструктурные сервисы (postgres + redis).
# Сервисы bot/web появятся в TASK-026 (prod-ready compose). См. ADR-0004 — Dockerfile-ы будут делать
# COPY src /app/src + PYTHONPATH=/app, без pip install.
#
# Запуск из корня репо: `make up` (или `docker compose --env-file .env -f infra/docker-compose.yml up -d`).
# Порты пробрасываются на 127.0.0.1, чтобы не торчать в локальную сеть с dev-машины.

name: bettgbot

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data:
  redis_data:
