<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Betting Bot Admin{% endblock %}</title>

    <!-- Design tokens -->
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/app.css">

    <!-- Bootstrap 5 (base for components) — vendored (TASK-079 self-host for CSP/SRI) -->
    <link rel="stylesheet" href="/static/vendor/bootstrap-5.3.3.min.css">

    <!-- Material Symbols for icons -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block">

    <!-- HTMX — vendored (TASK-079) -->
    <script src="/static/vendor/htmx-2.0.4.min.js"></script>

    <!-- Alpine.js CSP build — vendored (TASK-079 self-host, no jsdelivr in CSP) -->
    <script defer src="/static/vendor/alpine-csp-3.14.1.min.js"></script>

    {% block head_extra %}{% endblock %}
</head>
<body x-data="uiState">
{% block body %}{% endblock %}
{% block scripts_extra %}{% endblock %}
</body>
</html>
