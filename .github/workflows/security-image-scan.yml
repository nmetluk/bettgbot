name: Security (Docker Image - Trivy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sundays at 04:00 UTC (day after backup verify)
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  scan-web:
    name: Scan web image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build web image
        run: |
          docker build -t bettgbot-web:scan -f infra/Dockerfile.web .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bettgbot-web:scan
          format: 'sarif'
          output: 'trivy-web-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-web-results.sarif'
          category: 'trivy-web'

  scan-bot:
    name: Scan bot image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build bot image
        run: |
          docker build -t bettgbot-bot:scan -f infra/Dockerfile.bot .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bettgbot-bot:scan
          format: 'sarif'
          output: 'trivy-bot-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-bot-results.sarif'
          category: 'trivy-bot'
