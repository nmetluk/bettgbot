# ⚠️ DANGER: Prod-конфигурация БЕЗ домена и TLS.
# Использует порт 8888 на localhost (НЕ на 0.0.0.0!) без certbot.
# ПРЕДНАЗНАЧЕН ТОЛЬКО для доступа через ssh-tunnel (ssh -L 8888:127.0.0.1:8888).
# НЕБЕЗОПАСНО для публичного интернета — логин/пароль передаются в открытом виде!
# Для продакшена ОБЯЗАТЕЛЬНО используйте docker-compose.prod.yml с HTTPS.
services:
  db:
    restart: always
    # NOTE: DB/Redis ports are NOT exposed by default (no-domain is ssh-tunnel-only, closed; single-host too).
    # For split-host (Admin + dedicated worker bot) use overlay:
    #   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod-no-domain.yml -f infra/docker-compose.expose-db.yml ...
    # AND run firewall script on Admin host (see scripts/apply-bot-firewall.sh and WORKER_IP env). NEVER use overlay without firewall.

  redis:
    restart: always
    # Ports for redis managed via expose-db overlay + firewall only (see db above).

  bot:
    restart: always
    profiles:
      - bot
    environment:
      LOG_FORMAT: json
      # TASK-097/099: admin digests + backup heartbeat (enable heartbeat on exactly one bot instance)
      ADMIN_TELEGRAM_CHAT_IDS: ${ADMIN_TELEGRAM_CHAT_IDS:-}
      BACKUP_HEARTBEAT_ENABLED: ${BACKUP_HEARTBEAT_ENABLED:-false}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-2}
      # TASK-100: Backup replication (pull from Admin; for no-domain use IP in BACKUP_SOURCE_HOST)
      BACKUP_REPLICATION_ENABLED: ${BACKUP_REPLICATION_ENABLED:-false}
      BACKUP_SOURCE_HOST: ${BACKUP_SOURCE_HOST:-}
      BACKUP_SOURCE_SSH_USER: ${BACKUP_SOURCE_SSH_USER:-root}
      BACKUP_SSH_KEY_PATH: ${BACKUP_SSH_KEY_PATH:-/etc/ssh/keys/id_rsa}
      BACKUP_SOURCE_DIR: ${BACKUP_SOURCE_DIR:-/backups}
      BACKUP_LOCAL_DIR: ${BACKUP_LOCAL_DIR:-/backups}
      BACKUP_REPLICATION_MAX_LAG_HOURS: ${BACKUP_REPLICATION_MAX_LAG_HOURS:-3}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # TASK-100: read-only SSH key + local dir for replicated dumps
      - ${BACKUP_SSH_KEY_PATH:-/dev/null}:/etc/ssh/keys/id_rsa:ro
      - bb-bot-backups:/backups

  web:
    restart: always
    environment:
      LOG_FORMAT: json
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "127.0.0.1:8888:80"  # localhost only — доступ через ssh-tunnel
    volumes:
      - ./nginx/admin-no-domain.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  db-backup:
    build:
      context: ..
      dockerfile: infra/Dockerfile.db-backup
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      # Backup-specific (local-only path by default for no-domain; enable offsite if desired).
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:-}
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-3600}
    volumes:
      # TASK-108: bind-mount for replication source (if used as Admin in no-domain bootstrap).
      # Same as prod.yml; /opt/backups/bettgbot/db on host for ssh from worker if split.
      - /opt/backups/bettgbot/db:/backups
    depends_on:
      db: { condition: service_healthy }
    # Uses script from Dockerfile (INSERT running + UPDATE success/failed with filename per TASK-099 amendment)

volumes:
  bb-db-backups:
  bb-bot-backups:  # TASK-100: replicated backups on Bot server
