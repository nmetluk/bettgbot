name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests
      - name: ruff format --check
        run: uv run ruff format --check src tests

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: mypy
        # src/shared — strict; src/bot, src/admin — non-strict overrides в pyproject.
        run: uv run mypy src/shared src/bot src/admin

  test:
    name: Tests (pytest, unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: pytest
        # Явный путь tests/unit, иначе pytest при collection импортирует
        # tests/integration/repositories/test_*.py, что тянет src.shared.config
        # без stub-env (он живёт только в tests/unit/conftest.py).
        run: uv run pytest tests/unit -m "not integration"

  integration:
    name: Integration (alembic on real postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: pytest -m integration
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          # Минимум, чтобы импорт src.shared.config не упал в env.py alembic'а
          TELEGRAM_BOT_TOKEN: test
          REDIS_URL: redis://localhost:6379/0
          ADMIN_SECRET_KEY: test-secret
          ADMIN_CSRF_SECRET: test-csrf-secret
        run: uv run pytest tests/integration -m integration -v

  security-sast:
    name: Security (SAST - bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: bandit scan
        run: uv run bandit -r src/ -ll -f json -o bandit-report.json || true
      - name: bandit check (fail on HIGH/CRITICAL)
        run: |
          uv run bandit -r src/ -ll -ii
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  security-deps:
    name: Security (Dependencies - pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: pip-audit scan
        run: |
          uv pip freeze > requirements.txt
          uv run pip-audit --strict --desc --requirement requirements.txt || true
      - name: pip-audit check (fail on VULNERABILITIES)
        run: |
          uv pip freeze > requirements.txt
          uv run pip-audit --strict --requirement requirements.txt

  security-secrets:
    name: Security (Secrets - gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  #_full history for better secret detection
      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional for faster scans
