services:
  db:
    restart: always

  redis:
    restart: always

  bot:
    image: ghcr.io/nmetluk/bettgbot-bot:${IMAGE_TAG:-latest}
    restart: always
    environment:
      LOG_FORMAT: json
      # TASK-099: Backup health heartbeat (consumer side)
      BACKUP_HEARTBEAT_ENABLED: ${BACKUP_HEARTBEAT_ENABLED:-false}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-2}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/nmetluk/bettgbot-web:${IMAGE_TAG:-latest}
    restart: always
    environment:
      LOG_FORMAT: json
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Подставляется в admin.conf.template через встроенный envsubst nginx-образа.
      # Имя переменной должно совпадать с ${ADMIN_DOMAIN} в .template.
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    volumes:
      # Образ nginx сам прогоняет файлы из /etc/nginx/templates/ через envsubst
      # и кладёт результат в /etc/nginx/conf.d/ перед запуском.
      - ./nginx/admin.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      web: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet;
                         sleep 12h & wait $${!}; done"

  db-backup:
    build:
      context: ..
      dockerfile: infra/Dockerfile.db-backup
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      # Backup-specific env (optional if BACKUP_ENABLED=false).
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:-}
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-3600}
      # Rclone config via env (RCLONE_CONFIG_* takes precedence over file).
      # Owner: set RCLONE_CONFIG_B2_TYPE=b2, RCLONE_CONFIG_B2_ACCOUNT, RCLONE_CONFIG_B2_KEY.
    volumes:
      - bb-db-backups:/backups
      # Optional: mount rclone config from secret (mode 0400) for prod.
      # - ${RCLONE_CONFIG_PATH:-/dev/null}:/config/rclone.conf:ro
    depends_on:
      db: { condition: service_healthy }
    # Use the script from Dockerfile (which now writes to backup_run with filename per TASK-099 amendment)
    # command removed to use Dockerfile CMD

volumes:
  certbot_certs:
  certbot_www:
  bb-db-backups: