name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests
      - name: ruff format --check
        run: uv run ruff format --check src tests

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: mypy
        run: uv run mypy src/shared

  test:
    name: Tests (pytest, unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: pytest
        run: uv run pytest -m "not integration"

  integration:
    name: Integration (alembic on real postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync deps (frozen)
        run: uv sync --frozen
      - name: pytest -m integration
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          # Минимум, чтобы импорт src.shared.config не упал в env.py alembic'а
          TELEGRAM_BOT_TOKEN: test
          REDIS_URL: redis://localhost:6379/0
          ADMIN_SECRET_KEY: test-secret
        run: uv run pytest tests/integration -m integration -v
