name: handoff-consistency

# Проверяет инварианты workflow handoff/:
#
# (1) После закрытия задачи (move в archive) в inbox/ не должно оставаться
#     файлов с тем же TASK-NNN.
# (2) handoff/archive/ должна содержать только директории вида TASK-NNN-<slug>/
#     с task.md/report.md/amendments/ внутри — не TASK-NNN.md прямо в archive/.
# (3) В каждой archive-директории должен быть файл task.md.
# (4) У каждой архивной задачи должен быть report.md (в outbox или в archive).
# (5) На main в inbox/ не должно быть transient-суффиксов (.in-progress.md,
#     .blocked.md) — они leak'ят рабочее состояние после merge (TASK-080).
#
# Контекст: 5 случаев подряд (TASK-028..032) CC нарушал move-семантику.
# В TASK-032 дополнительно сломалась convention (положил файл вместо
# директории), что обошло первую версию этого CI-check'a. Расширили до 4
# проверок в TASK-052 после 9 случаев подряд отсутствия report.md.
# TASK-080 добавил (5) после инцидента с TASK-076.in-progress на main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-handoff-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check archive format (directory, not file) + no inbox orphans
        run: |
          set -euo pipefail
          violations=0

          if [ ! -d handoff/archive ]; then
            echo "✓ handoff/archive не существует — нечего проверять"
            exit 0
          fi

          # (2) archive должна содержать только директории TASK-NNN-<slug>/, не файлы TASK-NNN.md
          echo "→ Проверка формата handoff/archive (только директории)..."
          for orphan_file in handoff/archive/TASK-*.md; do
            [ -e "$orphan_file" ] || continue  # glob не раскрылся — ничего нет
            if [ -f "$orphan_file" ]; then
              task_id=$(basename "$orphan_file" .md | grep -oE '^TASK-[0-9]+')
              echo "❌ Archive convention violation: $orphan_file"
              echo "   Должно быть: handoff/archive/${task_id}-<slug>/task.md (директория)"
              echo "   См. handoff/README.md секция «Где история»."
              violations=$((violations + 1))
            fi
          done

          # (1) Для каждого TASK-NNN в archive (директория ИЛИ файл-нарушение) —
          # не должно быть TASK-NNN* в inbox.
          echo "→ Проверка inbox vs archive (move-семантика)..."
          archived_ids=$(
            {
              find handoff/archive -maxdepth 1 -type d -name 'TASK-*' -exec basename {} \; 2>/dev/null
              find handoff/archive -maxdepth 1 -type f -name 'TASK-*.md' -exec basename {} .md \; 2>/dev/null
            } | grep -oE '^TASK-[0-9]+' | sort -u
          )
          for task_id in $archived_ids; do
            orphans=$(find handoff/inbox -maxdepth 1 -name "${task_id}*.md" 2>/dev/null || true)
            if [ -n "$orphans" ]; then
              echo "❌ Workflow violation: $task_id уже в handoff/archive/, но в handoff/inbox/ остались:"
              echo "$orphans" | sed 's/^/   /'
              violations=$((violations + 1))
            fi
          done

          # (3) В каждой handoff/archive/TASK-NNN-<slug>/ должен быть файл task.md
          echo "→ Проверка task.md в archive-директориях..."
          for dir in handoff/archive/TASK-*/; do
            [ -d "$dir" ] || continue
            if [ ! -f "${dir}task.md" ]; then
              echo "❌ Archive directory без task.md: $dir"
              echo "   Внутри должен быть файл task.md (не TASK-NNN-<slug>.md)."
              violations=$((violations + 1))
            fi
          done

          # (4) У каждой архивной задачи должен быть report (в outbox или в archive)
          echo "→ Проверка отчётов..."
          for dir in handoff/archive/TASK-*/; do
            task_id=$(basename "$dir" | grep -oE '^TASK-[0-9]+')
            [ -z "$task_id" ] && continue
            outbox="handoff/outbox/${task_id}-report.md"
            archive_report="${dir}report.md"
            if [ ! -f "$outbox" ] && [ ! -f "$archive_report" ]; then
              echo "❌ $task_id: нет ни ${outbox}, ни ${archive_report}"
              violations=$((violations + 1))
            fi
          done

          # (5) NEW (TASK-080): transient suffixes (.in-progress/.blocked) must not exist in inbox on main
          #     (on feature branches they are expected and part of the handoff lifecycle; only block if seen on main)
          if [ "${GITHUB_REF:-}" = "refs/heads/main" ] || [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            echo "→ Проверка transient-суффиксов в inbox (TASK-080, main only)..."
            for transient in handoff/inbox/TASK-*.in-progress.md handoff/inbox/TASK-*.blocked.md; do
              [ -e "$transient" ] || continue
              if [ -f "$transient" ]; then
                echo "❌ Transient suffix leaked to main: $transient"
                echo "   На main в inbox/ должны быть только открытые TASK-NNN-<slug>.md (или ничего)."
                echo "   .in-progress/.blocked — transient состояния ЖЦ (см. CLAUDE.md), не должны утекать в main."
                violations=$((violations + 1))
              fi
            done
          else
            echo "→ Проверка transient-суффиксов пропущена (не main; transients легитимны на feature-ветках TASK-NNN)"
          fi

          if [ $violations -gt 0 ]; then
            echo ""
            echo "Найдено $violations нарушений handoff-инвариантов."
            echo "Перед коммитом 'chore(handoff): archive TASK-NNN ...' нужно:"
            echo "  - переместить task.md в handoff/archive/TASK-NNN-<slug>/ (директория!)"
            echo "  - git rm handoff/inbox/TASK-NNN-<slug>.md"
            echo "  - git rm handoff/inbox/TASK-NNN.in-progress.md"
            echo "См. handoff/README.md секции «Где история» и «Move-семантика inbox → archive»."
            exit 1
          fi
          echo "✓ handoff-инварианты соблюдены"
