# Nginx конфиг для работы БЕЗ домена и TLS.
# Слушает порт 80 внутри контейнера (снаружи пробрасывается как 8888).
# Не содержит HTTPS — передавать логин/пароль по открытому соединению НЕБЕЗОПАСНО!
# Использовать только для тестирования или в доверительной сети.

server {
    listen 80;
    server_name _;

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 1m;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
