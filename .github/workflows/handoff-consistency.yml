name: handoff-consistency

# Проверяет инвариант workflow handoff/: после закрытия задачи (move в archive)
# в inbox/ не должно оставаться файлов с тем же TASK-NNN.
#
# Контекст: 4 случая подряд (TASK-028..031) CC оставлял в inbox оригинал
# (TASK-NNN-<slug>.md) и rename (TASK-NNN.in-progress.md), хотя финальная
# копия уже была в archive/TASK-NNN-<slug>/task.md. Cowork-агент чистил
# руками. Подсекция в handoff/README.md (TASK-029 cleanup) и DoD-пункт
# с 🚨 в handoff/templates/task.md (TASK-030 cleanup) — не сработали:
# CC не перечитывает README и игнорирует DoD-пункт. Этот workflow —
# принудительная защита на серверной стороне: блочит merge в main, пока
# инвариант не восстановлен.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-inbox-archive-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no inbox orphans after archive
        run: |
          set -euo pipefail
          violations=0
          if [ ! -d handoff/archive ]; then
            echo "✓ handoff/archive не существует — нечего проверять"
            exit 0
          fi
          for archive_dir in handoff/archive/TASK-*; do
            [ -d "$archive_dir" ] || continue
            task_id=$(basename "$archive_dir" | grep -oE '^TASK-[0-9]+')
            [ -n "$task_id" ] || continue
            orphans=$(find handoff/inbox -maxdepth 1 -name "${task_id}*.md" 2>/dev/null || true)
            if [ -n "$orphans" ]; then
              echo "❌ Workflow violation: $task_id уже в handoff/archive/, но в handoff/inbox/ остались:"
              echo "$orphans" | sed 's/^/   /'
              violations=$((violations + 1))
            fi
          done
          if [ $violations -gt 0 ]; then
            echo ""
            echo "Найдено $violations нарушений move-семантики inbox → archive."
            echo "Перед коммитом 'chore(handoff): archive TASK-NNN ...' нужно:"
            echo "  git rm handoff/inbox/TASK-NNN-<slug>.md"
            echo "  git rm handoff/inbox/TASK-NNN.in-progress.md"
            echo "См. handoff/README.md подсекция «Move-семантика inbox → archive»."
            exit 1
          fi
          echo "✓ Инвариант handoff соблюдён: ни один TASK-NNN из archive не остался в inbox"
