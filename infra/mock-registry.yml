# Пример конфигурации mock-реестра пользователей.
# Используется реализацией MockExternalUserRegistryClient (см. docs/06-external-api.md).
#
# В реальной работе скопируйте этот файл в infra/mock-registry.local.yml
# (он в .gitignore) и заполните своими телефонами.

allowed:
  - phone: "+71111111111"
    external_user_id: "u-001"
    display_name: "Тестовый Пользователь Один"
  - phone: "+72222222222"
    external_user_id: "u-002"
    display_name: "Тестовый Пользователь Два"

blocked:
  - phone: "+79999999999"
    reason: "manual-block-for-tests"

simulate:
  # искусственная задержка ответа (имитация сети)
  latency_ms: 50
  # доля запросов, возвращающих ExternalApiError (для проверки error-handling)
  fail_rate: 0.0
