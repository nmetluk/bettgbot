name: bettgbot

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  bot:
    build:
      context: ..
      dockerfile: infra/Dockerfile.bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      REMINDER_TICK_SECONDS: ${REMINDER_TICK_SECONDS:-300}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      ADMIN_CSRF_SECRET: ${ADMIN_CSRF_SECRET}
      # Только bot (не web): для дневного дайджеста и пост-итоговых уведомлений (TASK-097)
      ADMIN_TELEGRAM_CHAT_IDS: ${ADMIN_TELEGRAM_CHAT_IDS:-}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      # web берёт ответственность за миграции, поэтому bot ждёт его healthcheck —
      # это убирает race на alembic upgrade head между двумя сервисами.
      web: { condition: service_healthy }
    command: ["python", "-m", "src.bot.main"]

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      ADMIN_SESSION_HOURS: ${ADMIN_SESSION_HOURS:-8}
      ADMIN_CSRF_SECRET: ${ADMIN_CSRF_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    depends_on:
      db: { condition: service_healthy }
    command: >
      sh -c "alembic upgrade head && uvicorn src.admin.app:app --host 0.0.0.0 --port 8000"

volumes:
  pg_data:
  redis_data:
