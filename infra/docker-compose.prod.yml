services:
  db:
    restart: always

  redis:
    restart: always

  bot:
    restart: always
    environment:
      LOG_FORMAT: json
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    restart: always
    environment:
      LOG_FORMAT: json
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Подставляется в admin.conf.template через встроенный envsubst nginx-образа.
      # Имя переменной должно совпадать с ${ADMIN_DOMAIN} в .template.
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    volumes:
      # Образ nginx сам прогоняет файлы из /etc/nginx/templates/ через envsubst
      # и кладёт результат в /etc/nginx/conf.d/ перед запуском.
      - ./nginx/admin.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      web: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet;
                         sleep 12h & wait $${!}; done"

  db-backup:
    image: postgres:16-alpine
    restart: always
    env_file: ../.env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bb-db-backups:/backups
    depends_on:
      db: { condition: service_healthy }
    command: >
      sh -c '
      while true; do
        current_time=$$(date -u +%H%M);
        target_time="0230";
        if [ "$$current_time" -ge "$$target_time" ]; then
          echo "→ Starting backup at $$(date -u +%FT%H-%M-%SZ)";
          if pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB --no-owner --clean --if-exists | gzip > /backups/bettgbot-$$(date -u +%FT%H-%M-%SZ).sql.gz; then
            echo "✓ Backup successful";
            find /backups -name "bettgbot-*.sql.gz" -mtime +14 -delete;
          else
            echo "[backup-error] pg_dump failed, keeping old backups";
          fi;
          sleep 86400;
        else
          sleep 300;
        fi;
      done
      '

volumes:
  certbot_certs:
  certbot_www:
  bb-db-backups: