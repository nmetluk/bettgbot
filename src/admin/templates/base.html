<!doctype html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Betting Bot Admin{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/volt.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>

    {% block head_extra %}{% endblock %}
</head>
<body>
<div class="container-fluid">
    <div class="row">
        {% block sidebar %}
        <nav class="sidebar col-md-3 col-lg-2 d-md-block bg-light min-vh-100 border-end">
            <ul class="nav flex-column p-3">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Дашборд</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/categories"><i class="bi bi-folder"></i> Категории</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link disabled" href="#"><i class="bi bi-calendar-event"></i> События (TASK-022)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link disabled" href="#"><i class="bi bi-people"></i> Пользователи (TASK-025)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link disabled" href="#"><i class="bi bi-journal-text"></i> Аудит (TASK-026)</a>
                </li>
                <li class="nav-item mt-3">
                    <form method="post" action="/logout">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token if csrf_token else '' }}">
                        <button type="submit" class="btn btn-sm btn-outline-secondary w-100">
                            <i class="bi bi-box-arrow-right"></i> Выйти
                        </button>
                    </form>
                </li>
            </ul>
        </nav>
        {% endblock %}
        <main class="col-md-9 col-lg-10 content">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
<script src="{{ url_for('static', path='js/volt.js') }}"></script>
{% block scripts_extra %}{% endblock %}
</body>
</html>
